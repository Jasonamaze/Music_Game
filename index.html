<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音感練習 - 專業版</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #f5a623;
            --khaki: #B8860B; /* 土黃色 / 暗金菊 */
            --sky-blue: #87CEEB;
            --cloud-white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #E0F7FA 100%);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: manipulation;
        }

        .container {
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; height: 100%;
            position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* 初始設定介面 */
        #start-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: white; z-index: 1000;
            display: flex; flex-direction: column; padding: 15px;
            overflow-y: auto;
        }

        .setting-group { margin-bottom: 10px; }
        .setting-group h3 {
            margin-bottom: 8px; color: #333;
            border-left: 5px solid var(--primary); padding-left: 10px; font-size: 0.9rem;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .option-btn {
            padding: 10px; border: 2px solid #ddd; border-radius: 10px;
            background: #fff; font-weight: bold; cursor: pointer; font-size: 0.85rem;
        }
        .option-btn.active { border-color: var(--primary); background: var(--primary); color: white; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; border-bottom: 1px solid #eee; flex-shrink: 0;
            background: #fff;
        }

        .display-area {
            width: 100%; height: 180px; position: relative; margin-top: 5px;
            display: flex; justify-content: center; align-items: center;
            background: white;
        }

        /* 鋼琴樣式 */
        #piano-container {
            display: none; width: 95%; height: 140px; position: relative;
            background: #222; padding: 2px; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .piano-key { position: absolute; border: 1px solid #333; border-radius: 0 0 5px 5px; transition: background 0.1s; }
        .white-key { background: white; width: 7.14%; height: 100%; z-index: 1; }
        .black-key { background: #000; width: 4.8%; height: 60%; z-index: 2; border-radius: 0 0 3px 3px; }
        
        /* 待選琴鍵改為紅色 */
        .key-highlight { background: red !important; box-shadow: inset 0 0 15px rgba(255,255,255,0.4); }
        /* 錯誤顏色 */
        .key-wrong { background: var(--khaki) !important; }

        /* 五線譜樣式 */
        #staff-svg { width: 100%; height: 100%; display: block; }
        .ledger-line { stroke: #333; stroke-width: 1.5; }

        /* 計時器 */
        #timer-container {
            position: absolute; top: -5px; left: 15%; right: 15%;
            height: 6px; background: rgba(0,0,0,0.05); border-radius: 3px; display: none;
            z-index: 5;
        }
        #timer-bar { width: 100%; height: 100%; background: var(--warning); border-radius: 3px; }

        /* 固定按鈕區域 - 不再隨音符移動 */
        .button-area {
            position: relative; flex-grow: 1; width: 100%; 
            background: #fdfdfd; padding: 10px 5px;
            display: flex; flex-direction: column; gap: 8px; align-items: center;
            justify-content: center;
        }
        .btn-row { display: flex; gap: 4px; width: 100%; justify-content: center; height: 55px; }
        .note-btn {
            background: #fff; border: 2px solid #ddd; padding: 10px 0;
            font-size: 1rem; font-weight: bold; border-radius: 10px;
            cursor: pointer; box-shadow: 0 3px 0 #ddd; width: 13.5%; text-align: center;
            transition: all 0.1s; color: var(--primary);
        }
        .note-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #ddd; }
        .note-btn.accidental { width: 18%; background: #f8f8f8; border-color: #ccc; box-shadow: 0 3px 0 #ccc; color: #555; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }
        .btn-main { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1 style="text-align: center; color: var(--primary); margin: 10px 0;">🎹 音感練習</h1>
        <div class="setting-group">
            <h3>練習模式</h3>
            <div class="options">
                <button class="option-btn active" onclick="setMode('all', this)">高低音隨機</button>
                <button class="option-btn" onclick="setMode('treble', this)">僅高音譜</button>
                <button class="option-btn" onclick="setMode('bass', this)">僅低音譜</button>
                <button class="option-btn" onclick="setMode('piano', this)">琴鍵識音</button>
            </div>
        </div>
        <div class="setting-group">
            <h3>挑戰模式</h3>
            <div class="options">
                <button class="option-btn active" onclick="setTiming(false, this)">休閒模式</button>
                <button class="option-btn" onclick="setTiming(true, this)">計時獎勵</button>
            </div>
        </div>
        <div style="margin-top: 15px;">
            <button class="btn-main" style="width: 100%; height: 50px; font-size: 1.1rem;" onclick="startGame()">開始練習 (10關)</button>
        </div>
    </div>

    <div class="header">
        <div id="level-label" style="font-weight:bold; color:#666">第 1 / 10 關</div>
        <div style="font-weight:bold; color:var(--primary)">分數: <span id="score-val">0</span></div>
    </div>

    <div class="display-area">
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <svg id="staff-svg" viewBox="0 0 400 140">
            <g stroke="#444" stroke-width="1.3">
                <line x1="60" y1="30" x2="390" y2="30" /><line x1="60" y1="50" x2="390" y2="50" />
                <line x1="60" y1="70" x2="390" y2="70" /><line x1="60" y1="90" x2="390" y2="90" />
                <line x1="60" y1="110" x2="390" y2="110" /><line x1="60" y1="30" x2="60" y2="110" stroke-width="2.5"/>
            </g>
            <g id="clef-layer"></g>
            <g id="notes-layer"></g>
        </svg>

        <div id="piano-container"></div>
    </div>

    <div class="button-area">
        <div class="btn-row" id="row-sharp" style="display: none;">
            <button class="note-btn accidental" onclick="checkAnswer('升Do')">升Do</button>
            <button class="note-btn accidental" onclick="checkAnswer('升Re')">升Re</button>
            <div style="width:13.5%"></div>
            <button class="note-btn accidental" onclick="checkAnswer('升Fa')">升Fa</button>
            <button class="note-btn accidental" onclick="checkAnswer('升So')">升So</button>
            <button class="note-btn accidental" onclick="checkAnswer('升La')">升La</button>
        </div>
        <div class="btn-row" id="row-white">
            <button class="note-btn" onclick="checkAnswer('Do')">Do</button>
            <button class="note-btn" onclick="checkAnswer('Re')">Re</button>
            <button class="note-btn" onclick="checkAnswer('Mi')">Mi</button>
            <button class="note-btn" onclick="checkAnswer('Fa')">Fa</button>
            <button class="note-btn" onclick="checkAnswer('So')">So</button>
            <button class="note-btn" onclick="checkAnswer('La')">La</button>
            <button class="note-btn" onclick="checkAnswer('Si')">Si</button>
        </div>
        <div class="btn-row" id="row-flat" style="display: none;">
            <div style="width:13.5%"></div>
            <button class="note-btn accidental" onclick="checkAnswer('降Re')">降Re</button>
            <button class="note-btn accidental" onclick="checkAnswer('降Mi')">降Mi</button>
            <div style="width:13.5%"></div>
            <button class="note-btn accidental" onclick="checkAnswer('降So')">降So</button>
            <button class="note-btn accidental" onclick="checkAnswer('降La')">降La</button>
            <button class="note-btn accidental" onclick="checkAnswer('降Si')">降Si</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="next-level-modal">
    <div class="modal"><h2>完成關卡！</h2><button class="btn-main" onclick="startLevel(true)">下一關</button></div>
</div>
<div class="modal-overlay" id="summary-modal">
    <div class="modal"><h2>練習總結</h2><h1 id="final-score" style="color:var(--primary); font-size:4rem;">0</h1><button class="btn-main" onclick="resetGame()">重新開始</button></div>
</div>

<script>
    const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const SEMITONES = {'Do':0,'升Do':1,'降Re':1,'Re':2,'升Re':3,'降Mi':3,'Mi':4,'Fa':5,'升Fa':6,'降So':6,'So':7,'升So':8,'降La':8,'La':9,'升La':10,'降Si':10,'Si':11};
    
    const TREBLE_PITCHES = [
        {name:'Do', y:130, ledger:true}, {name:'Re', y:120}, {name:'Mi', y:110}, {name:'Fa', y:100},
        {name:'So', y:90}, {name:'La', y:80}, {name:'Si', y:70}, {name:'Do', y:60},
        {name:'Re', y:50}, {name:'Mi', y:40}, {name:'Fa', y:30}, {name:'So', y:20}
    ];
    const BASS_PITCHES = [
        {name:'Do', y:10, ledger:true}, {name:'Si', y:20}, {name:'La', y:30}, {name:'So', y:40},
        {name:'Fa', y:50}, {name:'Mi', y:60}, {name:'Re', y:70}, {name:'Do', y:80},
        {name:'Si', y:90}, {name:'La', y:100}, {name:'So', y:110}, {name:'Fa', y:120}
    ];

    const PIANO_BLACK_KEYS = [
        {sharp:'升Do', flat:'降Re', semi:1, left:0}, {sharp:'升Re', flat:'降Mi', semi:3, left:1},
        {sharp:'升Fa', flat:'降So', semi:6, left:3}, {sharp:'升So', flat:'降La', semi:8, left:4},
        {sharp:'升La', flat:'降Si', semi:10, left:5}
    ];

    let state = { score: 0, currentLevel: 1, mode: 'all', isTiming: false, notes: [], activeIndex: 0, timerInterval: null };

    function setMode(m, el) { state.mode = m; updateOptionBtns(el); }
    function setTiming(t, el) { state.isTiming = t; updateOptionBtns(el); }
    function updateOptionBtns(el) { el.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

    function startGame() {
        if (AudioCtx.state === 'suspended') AudioCtx.resume();
        document.getElementById('start-screen').style.display = 'none';
        initPiano();
        startLevel();
    }

    function initPiano() {
        const container = document.getElementById('piano-container');
        container.innerHTML = '';
        for (let oct = 0; oct < 2; oct++) {
            for (let i = 0; i < 7; i++) {
                const wk = document.createElement('div');
                wk.className = 'piano-key white-key';
                wk.style.left = ((oct * 7 + i) * 7.14) + '%';
                wk.id = `wk-${oct}-${i}`;
                container.appendChild(wk);
            }
            PIANO_BLACK_KEYS.forEach(bk => {
                const bkey = document.createElement('div');
                bkey.className = 'piano-key black-key';
                bkey.style.left = ((oct * 7 + bk.left) * 7.14 + 4.8) + '%';
                bkey.id = `bk-${oct}-${bk.semi}`;
                container.appendChild(bkey);
            });
        }
    }

    function startLevel(isNext = false) {
        if (isNext) state.currentLevel++;
        document.getElementById('next-level-modal').style.display = 'none';
        document.getElementById('level-label').innerText = `第 ${state.currentLevel} / 10 關`;
        
        let activeMode = state.mode;
        if (state.mode === 'all') activeMode = (Math.random() > 0.5 ? 'treble' : 'bass');
        
        const isPiano = (activeMode === 'piano');
        document.getElementById('staff-svg').style.display = isPiano ? 'none' : 'block';
        document.getElementById('piano-container').style.display = isPiano ? 'block' : 'none';

        if (!isPiano) drawClef(activeMode);
        generateNotes(activeMode);
        state.activeIndex = 0;
        updateUI();
    }

    function drawClef(mode) {
        const layer = document.getElementById('clef-layer');
        layer.innerHTML = '';
        const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
        if (mode === 'treble') {
            img.setAttribute("href", "High_sym.png");
            img.setAttribute("x", "10"); img.setAttribute("y", "5"); img.setAttribute("width", "40"); img.setAttribute("height", "130");
        } else {
            img.setAttribute("href", "Low_sym.png");
            img.setAttribute("x", "12"); img.setAttribute("y", "28"); img.setAttribute("width", "45"); img.setAttribute("height", "45");
        }
        layer.appendChild(img);
    }

    function generateNotes(mode) {
        state.notes = [];
        const layer = document.getElementById('notes-layer');
        layer.innerHTML = '';
        
        for (let i = 0; i < 6; i++) {
            let note;
            if (mode === 'piano') {
                note = generatePianoNote();
            } else {
                const pool = mode === 'treble' ? TREBLE_PITCHES : BASS_PITCHES;
                const raw = pool[Math.floor(Math.random() * pool.length)];
                note = { ...raw, x: 120 + i * 45, id: i, oct: 0, solved: false };
                renderStaffNote(note);
            }
            state.notes.push(note);
        }
    }

    function generatePianoNote() {
        const lv = state.currentLevel;
        let note = {};
        const oct = Math.floor(Math.random() * 2);
        if (lv <= 3) {
            const idx = Math.floor(Math.random() * 7);
            note = { name: ['Do','Re','Mi','Fa','So','La','Si'][idx], keyId: `wk-${oct}-${idx}`, oct: oct };
        } else if (lv <= 5) {
            const bk = PIANO_BLACK_KEYS[Math.floor(Math.random() * 5)];
            note = { name: bk.sharp, keyId: `bk-${oct}-${bk.semi}`, oct: oct };
        } else if (lv <= 7) {
            const bk = PIANO_BLACK_KEYS[Math.floor(Math.random() * 5)];
            note = { name: bk.flat, keyId: `bk-${oct}-${bk.semi}`, oct: oct };
        } else {
            const isBlack = Math.random() > 0.5;
            if (!isBlack) {
                const idx = Math.floor(Math.random() * 7);
                note = { name: ['Do','Re','Mi','Fa','So','La','Si'][idx], keyId: `wk-${oct}-${idx}`, oct: oct };
            } else {
                const bk = PIANO_BLACK_KEYS[Math.floor(Math.random() * 5)];
                const useSharp = Math.random() > 0.5;
                note = { name: useSharp ? bk.sharp : bk.flat, keyId: `bk-${oct}-${bk.semi}`, oct: oct };
            }
        }
        return note;
    }

    function renderStaffNote(note) {
        const layer = document.getElementById('notes-layer');
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        if (note.ledger) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", note.x - 12); line.setAttribute("x2", note.x + 12);
            line.setAttribute("y1", note.y); line.setAttribute("y2", note.y);
            line.setAttribute("class", "ledger-line");
            g.appendChild(line);
        }
        const ellipse = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        ellipse.setAttribute("cx", note.x); ellipse.setAttribute("cy", note.y);
        ellipse.setAttribute("rx", "7.5"); ellipse.setAttribute("ry", "5.8");
        ellipse.setAttribute("transform", `rotate(-20, ${note.x}, ${note.y})`);
        ellipse.setAttribute("fill", "#000"); ellipse.id = `note-head-${note.id}`;
        g.appendChild(ellipse);
        layer.appendChild(g);
    }

    function updateUI() {
        if (!state.notes[state.activeIndex]) return;
        const note = state.notes[state.activeIndex];
        
        const isPiano = document.getElementById('piano-container').style.display === 'block';
        if (isPiano) {
            document.querySelectorAll('.piano-key').forEach(k => k.classList.remove('key-highlight', 'key-wrong'));
            if (note.keyId) document.getElementById(note.keyId).classList.add('key-highlight');
        } else {
            state.notes.forEach((n, idx) => {
                const h = document.getElementById(`note-head-${idx}`);
                if (h) {
                    if (idx === state.activeIndex) {
                        h.setAttribute('fill', 'red');
                        h.setAttribute('rx', '11.25'); // 1.5倍
                        h.setAttribute('ry', '8.7');
                    } else {
                        h.setAttribute('fill', n.solved ? 'var(--success)' : '#000');
                        h.setAttribute('rx', '7.5');
                        h.setAttribute('ry', '5.8');
                    }
                }
            });
        }

        const rowSharp = document.getElementById('row-sharp');
        const rowFlat = document.getElementById('row-flat');
        if (note.name.startsWith('升')) {
            rowSharp.style.display = 'flex'; rowFlat.style.display = 'none';
        } else if (note.name.startsWith('降')) {
            rowSharp.style.display = 'none'; rowFlat.style.display = 'flex';
        } else {
            rowSharp.style.display = 'none'; rowFlat.style.display = 'none';
        }

        state.startTime = Date.now();
        if (state.isTiming) startTimer();
    }

    function startTimer() {
        if (state.timerInterval) clearInterval(state.timerInterval);
        const bar = document.getElementById('timer-bar');
        document.getElementById('timer-container').style.display = 'block';
        state.timerInterval = setInterval(() => {
            const elapsed = Date.now() - state.startTime;
            const prog = Math.max(0, 100 - (elapsed / 5000) * 100);
            bar.style.width = prog + '%';
            if (prog === 0) clearInterval(state.timerInterval);
        }, 50);
    }

    function checkAnswer(ans) {
        const note = state.notes[state.activeIndex];
        const elapsed = (Date.now() - state.startTime) / 1000;
        
        if (ans === note.name) {
            playPiano(note.name, note.oct);
            let pts = 1;
            if (state.isTiming) {
                if (elapsed <= 1) pts = 5;
                else if (elapsed <= 5) pts = Math.ceil(6 - elapsed);
                else pts = 0;
            }
            state.score += pts;
            note.solved = true;
            state.activeIndex++;
            
            if (state.activeIndex < 6) {
                setTimeout(updateUI, 200);
            } else {
                clearInterval(state.timerInterval);
                if (state.currentLevel < 10) document.getElementById('next-level-modal').style.display = 'flex';
                else showSummary();
            }
        } else {
            playError();
            state.score--;
            
            // 答錯視覺回饋
            const isPiano = document.getElementById('piano-container').style.display === 'block';
            if (isPiano) {
                const key = document.getElementById(note.keyId);
                if (key) {
                    key.classList.remove('key-highlight');
                    key.classList.add('key-wrong');
                    setTimeout(() => {
                        key.classList.remove('key-wrong');
                        key.classList.add('key-highlight');
                    }, 300);
                }
            } else {
                const head = document.getElementById(`note-head-${state.activeIndex}`);
                if (head) {
                    head.setAttribute('fill', 'var(--khaki)');
                    setTimeout(() => {
                        head.setAttribute('fill', 'red');
                    }, 300);
                }
            }
        }
        document.getElementById('score-val').innerText = state.score;
    }

    function playPiano(name, oct) {
        const freq = 261.63 * Math.pow(2, oct + SEMITONES[name]/12);
        const osc = AudioCtx.createOscillator();
        const g = AudioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.value = freq;
        g.gain.setValueAtTime(0.5, AudioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 1.2);
        osc.connect(g); g.connect(AudioCtx.destination);
        osc.start(); osc.stop(AudioCtx.currentTime + 1.2);
    }

    function playError() {
        const osc = AudioCtx.createOscillator();
        const g = AudioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 110;
        g.gain.setValueAtTime(0.3, AudioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 0.2);
        osc.connect(g); g.connect(AudioCtx.destination);
        osc.start(); osc.stop(AudioCtx.currentTime + 0.2);
    }

    function showSummary() {
        document.getElementById('summary-modal').style.display = 'flex';
        document.getElementById('final-score').innerText = state.score;
    }

    function resetGame() { location.reload(); }
</script>
</body>
</html>
