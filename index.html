<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五線譜音感練習 - 藍天雲朵版</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #f5a623;
            --sky-blue: #87CEEB;
            --cloud-white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #E0F7FA 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 雲朵裝飾 */
        .cloud {
            position: absolute;
            background: var(--cloud-white);
            border-radius: 50px;
            opacity: 0.8;
            z-index: -1;
            filter: blur(5px);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: var(--cloud-white);
            border-radius: 50%;
        }
        .cloud-1 { width: 100px; height: 40px; top: 10%; left: 10%; animation: move 20s linear infinite; }
        .cloud-2 { width: 150px; height: 60px; top: 20%; right: 5%; animation: move 25s linear infinite reverse; }
        .cloud-3 { width: 120px; height: 50px; bottom: 30%; left: -50px; animation: move 30s linear infinite; }

        @keyframes move {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 100px)); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* 初始設定介面 */
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            overflow-y: auto;
            border-radius: 15px;
        }

        .setting-group { margin-bottom: 20px; }
        .setting-group h3 {
            margin-bottom: 12px;
            color: #333;
            border-left: 5px solid var(--primary);
            padding-left: 10px;
            font-size: 1rem;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .option-btn {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .option-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
            background: transparent;
        }

        .score-box { font-weight: bold; color: var(--primary); font-size: 1.2rem; }

        /* 五線譜區域 */
        .staff-area {
            width: 100%;
            flex-shrink: 0;
            height: 150px;
            position: relative;
            margin-top: 10px;
        }

        #timer-container {
            position: absolute;
            top: 0px; left: 60px; right: 10px;
            height: 6px; background: rgba(0,0,0,0.05);
            border-radius: 3px; display: none;
        }
        #timer-bar {
            width: 100%; height: 100%; background: var(--warning);
            border-radius: 3px; transition: width 0.1s linear;
        }

        svg { width: 100%; height: 100%; display: block; }

        /* 按鈕區域 */
        .button-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            overflow: hidden;
            margin-top: 10px;
        }

        #controls-wrapper {
            position: absolute;
            top: 5px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 70px; 
            display: flex;
            flex-direction: column-reverse; 
            gap: 4px;
            z-index: 10;
        }

        .note-btn {
            background: #fff;
            border: 2px solid #eee;
            padding: 10px 0;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #eee;
            transition: all 0.1s;
            width: 100%;
            color: #444;
        }
        .note-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #eee;
        }

        @keyframes flash-green {
            0% { background: var(--success); color: white; }
            100% { background: #fff; color: inherit; }
        }
        @keyframes flash-red {
            0% { background: var(--danger); color: white; }
            100% { background: #fff; color: inherit; }
        }
        .correct-anim { animation: flash-green 0.5s ease-out; }
        .wrong-anim { animation: flash-red 0.5s ease-out; }

        .ledger-line { stroke: #333; stroke-width: 1.5; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-main {
            padding: 15px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #357ABD;
        }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #357ABD; }
        .btn-secondary { background: #999; margin-left: 10px; box-shadow: 0 4px 0 #777; }

        #final-score { font-size: 4rem; color: var(--primary); font-weight: bold; display: block; margin: 10px 0; }
        
        #point-feedback {
            position: absolute;
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--success);
            pointer-events: none;
            opacity: 0;
            transition: all 0.5s ease-out;
        }
    </style>
</head>
<body>

<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<div class="container">
    <div id="start-screen">
        <h1 style="text-align: center; color: var(--primary); margin-top: 0;">🎹 音感練習</h1>
        
        <div class="setting-group">
            <h3>練習譜號</h3>
            <div class="options">
                <button class="option-btn active" onclick="setClefMode('all', this)">高低音隨機</button>
                <button class="option-btn" onclick="setClefMode('treble', this)">僅高音譜</button>
                <button class="option-btn" onclick="setClefMode('bass', this)">僅低音譜</button>
            </div>
        </div>

        <div class="setting-group">
            <h3>挑戰模式</h3>
            <div class="options">
                <button class="option-btn active" onclick="setTimingMode(false, this)">休閒模式</button>
                <button class="option-btn" onclick="setTimingMode(true, this)">計時獎勵</button>
            </div>
        </div>

        <div style="flex-grow: 1; display: flex; align-items: flex-end;">
            <button class="btn-main" style="width: 100%; height: 70px;" onclick="startGame()">開始練習 (共10關)</button>
        </div>
    </div>

    <div class="header">
        <div id="level-label" style="font-weight:bold; color:#666">第 1 / 10 關</div>
        <div class="score-box">分數: <span id="score-val">0</span></div>
    </div>

    <div class="staff-area">
        <div id="timer-container"><div id="timer-bar"></div></div>
        <div id="point-feedback"></div>
        <svg id="staff-svg" viewBox="0 0 400 140">
            <g stroke="#444" stroke-width="1.3">
                <line x1="60" y1="30" x2="390" y2="30" />
                <line x1="60" y1="50" x2="390" y2="50" />
                <line x1="60" y1="70" x2="390" y2="70" />
                <line x1="60" y1="90" x2="390" y2="90" />
                <line x1="60" y1="110" x2="390" y2="110" />
                <line x1="60" y1="30" x2="60" y2="110" stroke-width="2.5"/>
            </g>
            <g id="clef-layer"></g>
            <g id="notes-layer"></g>
        </svg>
    </div>

    <div class="button-area">
        <div id="controls-wrapper">
            <button class="note-btn" onclick="checkAnswer('Do')">Do</button>
            <button class="note-btn" onclick="checkAnswer('Re')">Re</button>
            <button class="note-btn" onclick="checkAnswer('Mi')">Mi</button>
            <button class="note-btn" onclick="checkAnswer('Fa')">Fa</button>
            <button class="note-btn" onclick="checkAnswer('So')">So</button>
            <button class="note-btn" onclick="checkAnswer('La')">La</button>
            <button class="note-btn" onclick="checkAnswer('Si')">Si</button>
        </div>
    </div>
</div>

<!-- 下一關對話框 -->
<div class="modal-overlay" id="next-level-modal">
    <div class="modal">
        <h2 style="color: var(--success);">全對了！</h2>
        <p>準備好下一關了嗎？</p>
        <button class="btn-main" onclick="startLevel(true)">下一關</button>
        <button class="btn-main btn-secondary" onclick="showSummary()">結束</button>
    </div>
</div>

<!-- 最終結算 -->
<div class="modal-overlay" id="summary-modal">
    <div class="modal">
        <h2 style="color: var(--primary);">練習結束</h2>
        <p>您的最終得分為</p>
        <span id="final-score">0</span>
        <button class="btn-main" style="width: 100%;" onclick="resetGame()">重新開始</button>
    </div>
</div>

<script>
    // --- 音效系統 (Web Audio API) ---
    const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const FREQUENCIES = {
        'Do': 261.63, 'Re': 293.66, 'Mi': 329.63, 'Fa': 349.23, 
        'So': 392.00, 'La': 440.00, 'Si': 493.88
    };

    function playPianoSound(name, octaveOffset = 0) {
        let freq = FREQUENCIES[name] * Math.pow(2, octaveOffset);
        const osc = AudioCtx.createOscillator();
        const gain = AudioCtx.createGain();
        
        osc.type = 'triangle'; // 較接近鋼琴溫潤的音色
        osc.frequency.setValueAtTime(freq, AudioCtx.currentTime);
        
        gain.gain.setValueAtTime(0, AudioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, AudioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 1.2);
        
        osc.connect(gain);
        gain.connect(AudioCtx.destination);
        
        osc.start();
        osc.stop(AudioCtx.currentTime + 1.2);
    }

    function playErrorSound() {
        const osc = AudioCtx.createOscillator();
        const gain = AudioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(120, AudioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, AudioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(AudioCtx.destination);
        osc.start();
        osc.stop(AudioCtx.currentTime + 0.1);
    }

    // --- 音位資料 ---
    const TREBLE_PITCHES = [
        { name: 'Do', y: 130, ledger: true, oct: 0 }, { name: 'Re', y: 120, oct: 0 }, { name: 'Mi', y: 110, oct: 0 },
        { name: 'Fa', y: 100, oct: 0 }, { name: 'So', y: 90, oct: 0 }, { name: 'La', y: 80, oct: 0 },
        { name: 'Si', y: 70, oct: 0 }, { name: 'Do', y: 60, oct: 1 }, { name: 'Re', y: 50, oct: 1 },
        { name: 'Mi', y: 40, oct: 1 }, { name: 'Fa', y: 30, oct: 1 }, { name: 'So', y: 20, oct: 1 }
    ];

    const BASS_PITCHES = [
        { name: 'Do', y: 10, ledger: true, oct: 0 }, { name: 'Si', y: 20, oct: -1 }, { name: 'La', y: 30, oct: -1 },
        { name: 'So', y: 40, oct: -1 }, { name: 'Fa', y: 50, oct: -1 }, { name: 'Mi', y: 60, oct: -1 },
        { name: 'Re', y: 70, oct: -1 }, { name: 'Do', y: 80, oct: -1 }, { name: 'Si', y: 90, oct: -2 },
        { name: 'La', y: 100, oct: -2 }, { name: 'So', y: 110, oct: -2 }, { name: 'Fa', y: 120, oct: -2 }
    ];

    let state = {
        score: 0,
        currentLevel: 1,
        maxLevels: 10,
        clef: 'treble',
        notes: [],
        activeIndex: 0,
        startTime: 0,
        config: { clefRange: 'all', isTiming: false },
        timerInterval: null
    };

    // --- 遊戲邏輯 ---
    function setClefMode(mode, el) {
        state.config.clefRange = mode;
        el.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function setTimingMode(isTiming, el) {
        state.config.isTiming = isTiming;
        el.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function startGame() {
        if (AudioCtx.state === 'suspended') AudioCtx.resume();
        document.getElementById('start-screen').style.display = 'none';
        state.score = 0;
        state.currentLevel = 1;
        document.getElementById('score-val').innerText = 0;
        startLevel();
    }

    function startLevel(isNext = false) {
        if (isNext) state.currentLevel++;
        document.getElementById('next-level-modal').style.display = 'none';
        document.getElementById('level-label').innerText = `第 ${state.currentLevel} / ${state.maxLevels} 關`;
        
        if (state.config.clefRange === 'all') state.clef = Math.random() > 0.5 ? 'treble' : 'bass';
        else state.clef = state.config.clefRange;
        
        if (state.config.isTiming) document.getElementById('timer-container').style.display = 'block';
        else document.getElementById('timer-container').style.display = 'none';

        drawClef();
        generateNotes();
        state.activeIndex = 0;
        updateActiveNote();
    }

    /**
     * 核心修改：使用 <image> 標籤載入外部圖片作為譜號
     */
    function drawClef() {
        const layer = document.getElementById('clef-layer');
        layer.innerHTML = '';
        
        const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
        const isTreble = state.clef === 'treble';
        
        // 設定圖片來源與位置比例
        if (isTreble) {
            img.setAttribute("href", "High_sym.png");
            img.setAttribute("x", "10");
            img.setAttribute("y", "5");
            img.setAttribute("width", "40");
            img.setAttribute("height", "130");
        } else {
            img.setAttribute("href", "Low_sym.png");
            img.setAttribute("x", "12");
            img.setAttribute("y", "28");
            img.setAttribute("width", "45");
            img.setAttribute("height", "45");
        }

        // 圖片載入失敗時的處理
        img.onerror = function() {
            console.error("無法載入譜號圖片，請檢查 GitHub 上檔案路徑是否正確。");
        };

        layer.appendChild(img);
    }

    function generateNotes() {
        state.notes = [];
        const layer = document.getElementById('notes-layer');
        layer.innerHTML = '';
        const pool = state.clef === 'treble' ? TREBLE_PITCHES : BASS_PITCHES;
        for (let i = 0; i < 6; i++) {
            const pitch = pool[Math.floor(Math.random() * pool.length)];
            const noteData = { ...pitch, id: i, x: 115 + i * 50, solved: false };
            state.notes.push(noteData);
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            if (noteData.ledger) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", noteData.x - 12); line.setAttribute("x2", noteData.x + 12);
                line.setAttribute("y1", noteData.y); line.setAttribute("y2", noteData.y);
                line.setAttribute("class", "ledger-line");
                g.appendChild(line);
            }
            const el = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            el.setAttribute("cx", noteData.x); el.setAttribute("cy", noteData.y);
            el.setAttribute("rx", "7.8"); el.setAttribute("ry", "6");
            el.setAttribute("transform", `rotate(-20, ${noteData.x}, ${noteData.y})`);
            el.setAttribute("fill", "#000"); el.id = `note-head-${i}`;
            g.appendChild(el);
            layer.appendChild(g);
        }
    }

    function updateActiveNote() {
        if (!state.notes[state.activeIndex]) return;

        const note = state.notes[state.activeIndex];
        const wrapper = document.getElementById('controls-wrapper');
        const svg = document.getElementById('staff-svg');
        const rect = svg.getBoundingClientRect();
        
        const ratio = note.x / 400; 
        const screenX = rect.width * ratio;
        wrapper.style.left = (screenX - 35) + "px";

        state.notes.forEach((n, idx) => {
            const head = document.getElementById(`note-head-${idx}`);
            if (!head) return;
            if (idx === state.activeIndex) {
                head.setAttribute("fill", "var(--primary)");
                head.setAttribute("stroke", "var(--primary)");
                head.setAttribute("stroke-width", "2");
            } else if (!n.solved) {
                head.setAttribute("fill", "#000");
                head.setAttribute("stroke", "none");
            }
        });

        state.startTime = Date.now();
        if (state.config.isTiming) startTimer();
    }

    function startTimer() {
        if (state.timerInterval) clearInterval(state.timerInterval);
        const bar = document.getElementById('timer-bar');
        bar.style.width = '100%';
        bar.style.background = 'var(--warning)';
        state.timerInterval = setInterval(() => {
            const elapsed = Date.now() - state.startTime;
            const progress = Math.max(0, 100 - (elapsed / 5000) * 100);
            bar.style.width = progress + '%';
            if (progress < 30) bar.style.background = 'var(--danger)';
            if (progress === 0) clearInterval(state.timerInterval);
        }, 50);
    }

    function checkAnswer(answer) {
        if (!state.notes[state.activeIndex]) return;
        const note = state.notes[state.activeIndex];
        const buttons = document.querySelectorAll('.note-btn');
        let targetBtn;
        buttons.forEach(b => { if(b.innerText === answer) targetBtn = b; });
        const noteHead = document.getElementById(`note-head-${state.activeIndex}`);
        const elapsed = (Date.now() - state.startTime) / 1000;

        if (note.name === answer) {
            playPianoSound(note.name, note.oct);
            let points = 1;
            if (state.config.isTiming) {
                if (elapsed <= 1) points = 5;
                else if (elapsed <= 2) points = 4;
                else if (elapsed <= 3) points = 3;
                else if (elapsed <= 4) points = 2;
                else if (elapsed <= 5) points = 1;
                else points = 0;
            }
            state.score += points;
            note.solved = true;
            if (noteHead) {
                noteHead.setAttribute("fill", "var(--success)");
                noteHead.setAttribute("stroke", "var(--success)");
            }
            targetBtn.classList.add('correct-anim');
            if (state.config.isTiming) showFeedback(points, note.x);
            setTimeout(() => targetBtn.classList.remove('correct-anim'), 500);
            
            clearInterval(state.timerInterval);
            state.activeIndex++;
            if (state.activeIndex < 6) {
                setTimeout(updateActiveNote, 300);
            } else {
                if (state.currentLevel >= state.maxLevels) {
                    setTimeout(showSummary, 600);
                } else {
                    setTimeout(() => { document.getElementById('next-level-modal').style.display = 'flex'; }, 500);
                }
            }
        } else {
            playErrorSound();
            state.score--;
            if (noteHead) {
                noteHead.setAttribute("fill", "var(--danger)");
                noteHead.setAttribute("stroke", "var(--danger)");
            }
            targetBtn.classList.add('wrong-anim');
            setTimeout(() => targetBtn.classList.remove('wrong-anim'), 500);
        }
        document.getElementById('score-val').innerText = state.score;
    }

    function showFeedback(pts, x) {
        const feedback = document.getElementById('point-feedback');
        const svgRect = document.getElementById('staff-svg').getBoundingClientRect();
        const screenX = svgRect.width * (x / 400);
        feedback.innerText = "+" + pts;
        feedback.style.left = (screenX - 10) + "px";
        feedback.style.top = "10px";
        feedback.style.opacity = "1";
        feedback.style.transform = "translateY(-15px)";
        setTimeout(() => { feedback.style.opacity = "0"; feedback.style.transform = "translateY(0)"; }, 600);
    }

    function showSummary() {
        document.getElementById('next-level-modal').style.display = 'none';
        document.getElementById('summary-modal').style.display = 'flex';
        document.getElementById('final-score').innerText = state.score;
    }

    function resetGame() {
        document.getElementById('summary-modal').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    }

    window.addEventListener('resize', updateActiveNote);
</script>

</body>
</html>
