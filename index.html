<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音感練習 - 鋼琴與五線譜專業版</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #f5a623;
            --sky-blue: #87CEEB;
            --cloud-white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #E0F7FA 100%);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: manipulation;
        }

        /* 雲朵裝飾 */
        .cloud {
            position: absolute; background: var(--cloud-white); border-radius: 50px;
            opacity: 0.6; z-index: -1; filter: blur(3px);
        }
        .cloud-1 { width: 100px; height: 40px; top: 10%; left: 10%; animation: move 40s linear infinite; }
        .cloud-2 { width: 150px; height: 60px; top: 15%; right: 5%; animation: move 50s linear infinite reverse; }
        @keyframes move { from { transform: translateX(-150px); } to { transform: translateX(calc(100vw + 150px)); } }

        .container {
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; height: 100%;
            position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* 初始設定 */
        #start-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: white; z-index: 1000;
            display: flex; flex-direction: column; padding: 25px;
        }
        .setting-group { margin-bottom: 20px; }
        .setting-group h3 { margin-bottom: 10px; color: #333; border-left: 5px solid var(--primary); padding-left: 10px; font-size: 1rem; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .option-btn {
            padding: 12px; border: 2px solid #ddd; border-radius: 12px;
            background: #fff; font-weight: bold; cursor: pointer; font-size: 0.9rem;
        }
        .option-btn.active { border-color: var(--primary); background: var(--primary); color: white; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-bottom: 1px solid #eee; flex-shrink: 0;
        }

        /* 顯示區域 */
        .display-area {
            width: 100%; height: 160px; position: relative; margin-top: 10px;
            display: flex; justify-content: center; align-items: center;
        }

        /* 鋼琴樣式 */
        #piano-container {
            display: none; width: 95%; height: 130px; position: relative;
            background: #222; padding: 2px; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .piano-key { position: absolute; border: 1px solid #333; border-radius: 0 0 5px 5px; transition: background 0.1s; }
        .white-key { background: white; width: 7.14%; height: 100%; z-index: 1; }
        .black-key { background: #000; width: 4.8%; height: 60%; z-index: 2; border-radius: 0 0 3px 3px; border: 1px solid #000; }
        .key-highlight { background: var(--warning) !important; box-shadow: inset 0 0 15px rgba(255,255,255,0.8); }

        /* 五線譜樣式 */
        svg { width: 100%; height: 100%; display: block; }
        .ledger-line { stroke: #333; stroke-width: 1.5; }

        /* 計時器 */
        #timer-container {
            position: absolute; top: -10px; left: 10%; right: 10%;
            height: 6px; background: rgba(0,0,0,0.05); border-radius: 3px; display: none;
        }
        #timer-bar { width: 100%; height: 100%; background: var(--warning); border-radius: 3px; }

        /* 固定按鈕區域 */
        .button-area {
            position: relative; flex-grow: 1; width: 100%; 
            background: #f9f9f9; padding: 15px 5px;
            display: flex; flex-direction: column; gap: 12px; align-items: center;
        }
        .btn-row { display: flex; gap: 5px; width: 100%; justify-content: center; }
        .note-btn {
            background: #fff; border: 2px solid #ddd; padding: 12px 0;
            font-size: 0.9rem; font-weight: bold; border-radius: 10px;
            cursor: pointer; box-shadow: 0 3px 0 #ddd; width: 13%; text-align: center;
            transition: all 0.1s;
        }
        .note-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #ddd; }
        .note-btn.accidental { width: 18%; background: #f0f0f0; border-color: #ccc; box-shadow: 0 3px 0 #ccc; }

        /* 反饋效果 */
        @keyframes flash-green { 0% { background: var(--success); color: white; } 100% { background: #fff; } }
        @keyframes flash-red { 0% { background: var(--danger); color: white; } 100% { background: #fff; } }
        .correct-anim { animation: flash-green 0.5s; }
        .wrong-anim { animation: flash-red 0.5s; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }
        .btn-main { padding: 15px 25px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>

<div class="container">
    <div id="start-screen">
        <h1 style="text-align: center; color: var(--primary); margin-top: 0;">🎹 音感練習專業版</h1>
        <div class="setting-group">
            <h3>練習模式</h3>
            <div class="options">
                <button class="option-btn active" onclick="setMode('all', this)">高低音隨機</button>
                <button class="option-btn" onclick="setMode('treble', this)">僅高音譜</button>
                <button class="option-btn" onclick="setMode('bass', this)">僅低音譜</button>
                <button class="option-btn" onclick="setMode('piano', this)">琴鍵識音</button>
            </div>
        </div>
        <div class="setting-group">
            <h3>挑戰模式</h3>
            <div class="options">
                <button class="option-btn active" onclick="setTiming(false, this)">休閒模式</button>
                <button class="option-btn" onclick="setTiming(true, this)">計時獎勵</button>
            </div>
        </div>
        <button class="btn-main" style="margin-top: auto; height: 60px; font-size: 1.2rem;" onclick="startGame()">開始練習 (10關)</button>
    </div>

    <div class="header">
        <div id="level-label" style="font-weight:bold; color:#666">第 1 / 10 關</div>
        <div class="score-box">分數: <span id="score-val">0</span></div>
    </div>

    <div class="display-area">
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <!-- 五線譜 (PNG 圖像載入) -->
        <svg id="staff-svg" viewBox="0 0 400 140" style="display: block;">
            <g stroke="#444" stroke-width="1.3">
                <line x1="60" y1="30" x2="390" y2="30" /><line x1="60" y1="50" x2="390" y2="50" />
                <line x1="60" y1="70" x2="390" y2="70" /><line x1="60" y1="90" x2="390" y2="90" />
                <line x1="60" y1="110" x2="390" y2="110" /><line x1="60" y1="30" x2="60" y2="110" stroke-width="2.5"/>
            </g>
            <g id="clef-layer"></g>
            <g id="notes-layer"></g>
        </svg>

        <!-- 鋼琴鍵盤 -->
        <div id="piano-container"></div>
    </div>

    <!-- 固定按鈕區域 -->
    <div class="button-area">
        <!-- 升記號按鈕列 -->
        <div class="btn-row" id="row-sharp">
            <button class="note-btn accidental" onclick="checkAnswer('升Do')">升Do</button>
            <button class="note-btn accidental" onclick="checkAnswer('升Re')">升Re</button>
            <div style="width:13%"></div>
            <button class="note-btn accidental" onclick="checkAnswer('升Fa')">升Fa</button>
            <button class="note-btn accidental" onclick="checkAnswer('升So')">升So</button>
            <button class="note-btn accidental" onclick="checkAnswer('升La')">升La</button>
            <div style="width:13%"></div>
        </div>

        <!-- 白鍵按鈕列 (始終顯示) -->
        <div class="btn-row" id="row-white">
            <button class="note-btn" onclick="checkAnswer('Do')">Do</button>
            <button class="note-btn" onclick="checkAnswer('Re')">Re</button>
            <button class="note-btn" onclick="checkAnswer('Mi')">Mi</button>
            <button class="note-btn" onclick="checkAnswer('Fa')">Fa</button>
            <button class="note-btn" onclick="checkAnswer('So')">So</button>
            <button class="note-btn" onclick="checkAnswer('La')">La</button>
            <button class="note-btn" onclick="checkAnswer('Si')">Si</button>
        </div>

        <!-- 降記號按鈕列 -->
        <div class="btn-row" id="row-flat">
            <div style="width:13%"></div>
            <button class="note-btn accidental" onclick="checkAnswer('降Re')">降Re</button>
            <button class="note-btn accidental" onclick="checkAnswer('降Mi')">降Mi</button>
            <div style="width:13%"></div>
            <button class="note-btn accidental" onclick="checkAnswer('降So')">降So</button>
            <button class="note-btn accidental" onclick="checkAnswer('降La')">降La</button>
            <button class="note-btn accidental" onclick="checkAnswer('降Si')">降Si</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="next-level-modal">
    <div class="modal"><h2 style="color:var(--success)">完成關卡！</h2><button class="btn-main" onclick="startLevel(true)">下一關</button></div>
</div>
<div class="modal-overlay" id="summary-modal">
    <div class="modal"><h2>練習總結</h2><h1 id="final-score" style="color:var(--primary); font-size:4rem;">0</h1><button class="btn-main" onclick="resetGame()">重新開始</button></div>
</div>

<script>
    const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // 頻率表 (半音階)
    const SEMITONES = {
        'Do': 0, '升Do': 1, '降Re': 1, 'Re': 2, '升Re': 3, '降Mi': 3, 'Mi': 4,
        'Fa': 5, '升Fa': 6, '降So': 6, 'So': 7, '升So': 8, '降La': 8, 'La': 9, '升La': 10, '降Si': 10, 'Si': 11
    };

    const PIANO_WHITE_KEYS = [
        { name: 'Do', semitone: 0 }, { name: 'Re', semitone: 2 }, { name: 'Mi', semitone: 4 },
        { name: 'Fa', semitone: 5 }, { name: 'So', semitone: 7 }, { name: 'La', semitone: 9 }, { name: 'Si', semitone: 11 }
    ];

    const PIANO_BLACK_KEYS = [
        { sharp: '升Do', flat: '降Re', semitone: 1, leftWk: 0 },
        { sharp: '升Re', flat: '降Mi', semitone: 3, leftWk: 1 },
        { sharp: '升Fa', flat: '降So', semitone: 6, leftWk: 3 },
        { sharp: '升So', flat: '降La', semitone: 8, leftWk: 4 },
        { sharp: '升La', flat: '降Si', semitone: 10, leftWk: 5 }
    ];

    let state = {
        score: 0, currentLevel: 1, mode: 'all', isTiming: false,
        notes: [], activeIndex: 0, currentClef: 'treble', timerInterval: null
    };

    function setMode(m, el) { state.mode = m; updateActiveBtn(el); }
    function setTiming(t, el) { state.isTiming = t; updateActiveBtn(el); }
    function updateActiveBtn(el) { el.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

    function startGame() {
        if (AudioCtx.state === 'suspended') AudioCtx.resume();
        document.getElementById('start-screen').style.display = 'none';
        initPiano();
        startLevel();
    }

    function initPiano() {
        const container = document.getElementById('piano-container');
        container.innerHTML = '';
        for (let oct = 0; oct < 2; oct++) {
            for (let i = 0; i < 7; i++) {
                const wk = document.createElement('div');
                wk.className = 'piano-key white-key';
                wk.style.left = ((oct * 7 + i) * 7.14) + '%';
                wk.id = `wk-${oct}-${i}`;
                container.appendChild(wk);
            }
            PIANO_BLACK_KEYS.forEach(bk => {
                const bkey = document.createElement('div');
                bkey.className = 'piano-key black-key';
                bkey.style.left = ((oct * 7 + bk.leftWk) * 7.14 + 4.8) + '%';
                bkey.id = `bk-${oct}-${bk.semitone}`;
                container.appendChild(bkey);
            });
        }
    }

    function startLevel(isNext = false) {
        if (isNext) state.currentLevel++;
        document.getElementById('next-level-modal').style.display = 'none';
        document.getElementById('level-label').innerText = `第 ${state.currentLevel} / 10 關`;
        
        let activeMode = state.mode;
        if (state.mode === 'all') activeMode = (Math.random() > 0.5 ? 'treble' : 'bass');
        
        const isPiano = (activeMode === 'piano');
        document.getElementById('staff-svg').style.display = isPiano ? 'none' : 'block';
        document.getElementById('piano-container').style.display = isPiano ? 'block' : 'none';

        if (!isPiano) drawClef(activeMode);

        state.notes = [];
        for (let i = 0; i < 6; i++) {
            state.notes.push(generateQuestion(activeMode));
        }
        state.activeIndex = 0;
        updateUI();
    }

    function drawClef(mode) {
        const layer = document.getElementById('clef-layer');
        layer.innerHTML = '';
        const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
        if (mode === 'treble') {
            img.setAttribute("href", "High_sym.png");
            img.setAttribute("x", "10"); img.setAttribute("y", "5"); img.setAttribute("width", "40"); img.setAttribute("height", "130");
        } else {
            img.setAttribute("href", "Low_sym.png");
            img.setAttribute("x", "12"); img.setAttribute("y", "28"); img.setAttribute("width", "45"); img.setAttribute("height", "45");
        }
        layer.appendChild(img);
    }

    function generateQuestion(mode) {
        if (mode === 'piano') {
            const level = state.currentLevel;
            let pool = [];
            
            if (level <= 3) { // 1-3 關: 白鍵
                pool = PIANO_WHITE_KEYS.map(k => ({...k, type: 'white'}));
            } else if (level <= 5) { // 4-5 關: 黑鍵 (升)
                pool = PIANO_BLACK_KEYS.map(k => ({ name: k.sharp, semitone: k.semitone, type: 'black' }));
            } else if (level <= 7) { // 6-7 關: 黑鍵 (降)
                pool = PIANO_BLACK_KEYS.map(k => ({ name: k.flat, semitone: k.semitone, type: 'black' }));
            } else { // 8-10 關: 混合
                const isBlack = Math.random() > 0.5;
                if (!isBlack) {
                    pool = PIANO_WHITE_KEYS.map(k => ({...k, type: 'white'}));
                } else {
                    const useSharp = Math.random() > 0.5;
                    pool = PIANO_BLACK_KEYS.map(k => ({ name: useSharp ? k.sharp : k.flat, semitone: k.semitone, type: 'black' }));
                }
            }

            const raw = pool[Math.floor(Math.random() * pool.length)];
            const oct = Math.floor(Math.random() * 2);
            return {
                name: raw.name,
                semitone: raw.semitone,
                octave: oct,
                type: raw.type,
                keyId: raw.type === 'white' ? `wk-${oct}-${PIANO_WHITE_KEYS.findIndex(k=>k.semitone===raw.semitone)}` : `bk-${oct}-${raw.semitone}`
            };
        } else {
            const pool = ['Do','Re','Mi','Fa','So','La','Si'];
            const name = pool[Math.floor(Math.random()*7)];
            return { name, semitone: SEMITONES[name], octave: 0, x: 120 + state.notes.length * 50, y: 70 };
        }
    }

    /**
     * 修改重點：根據當前題目動態顯示/隱藏升降記號按鈕列
     */
    function updateUI() {
        if (!state.notes[state.activeIndex]) return;
        const note = state.notes[state.activeIndex];
        
        // 鋼琴高亮
        document.querySelectorAll('.piano-key').forEach(k => k.classList.remove('key-highlight'));
        if (note.keyId) document.getElementById(note.keyId).classList.add('key-highlight');

        // 控制變調按鈕列的顯示
        const rowSharp = document.getElementById('row-sharp');
        const rowFlat = document.getElementById('row-flat');

        if (note.name.startsWith('升')) {
            rowSharp.style.display = 'flex';
            rowFlat.style.display = 'none';
        } else if (note.name.startsWith('降')) {
            rowSharp.style.display = 'none';
            rowFlat.style.display = 'flex';
        } else {
            // 白鍵時隱藏兩者，讓畫面保持整潔
            rowSharp.style.display = 'none';
            rowFlat.style.display = 'none';
        }

        state.startTime = Date.now();
        if (state.isTiming) startTimer();
    }

    function startTimer() {
        if (state.timerInterval) clearInterval(state.timerInterval);
        const bar = document.getElementById('timer-bar');
        document.getElementById('timer-container').style.display = 'block';
        state.timerInterval = setInterval(() => {
            const elapsed = Date.now() - state.startTime;
            const progress = Math.max(0, 100 - (elapsed / 5000) * 100);
            bar.style.width = progress + '%';
            if (progress === 0) clearInterval(state.timerInterval);
        }, 50);
    }

    function checkAnswer(ans) {
        const note = state.notes[state.activeIndex];
        const elapsed = (Date.now() - state.startTime) / 1000;
        
        if (ans === note.name) {
            playPiano(note.name, note.octave);
            let pts = 1;
            if (state.isTiming) {
                if (elapsed <= 1) pts = 5;
                else if (elapsed <= 5) pts = Math.ceil(6 - elapsed);
                else pts = 0;
            }
            state.score += pts;
            state.activeIndex++;
            
            if (state.activeIndex < 6) {
                setTimeout(updateUI, 200);
            } else {
                clearInterval(state.timerInterval);
                if (state.currentLevel < 10) document.getElementById('next-level-modal').style.display = 'flex';
                else showSummary();
            }
        } else {
            playError();
            state.score--;
        }
        document.getElementById('score-val').innerText = state.score;
    }

    function playPiano(name, oct) {
        const freq = 261.63 * Math.pow(2, oct + SEMITONES[name]/12);
        const osc = AudioCtx.createOscillator();
        const g = AudioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.value = freq;
        g.gain.setValueAtTime(0.5, AudioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 1);
        osc.connect(g); g.connect(AudioCtx.destination);
        osc.start(); osc.stop(AudioCtx.currentTime + 1);
    }

    function playError() {
        const osc = AudioCtx.createOscillator();
        const g = AudioCtx.createGain();
        osc.frequency.value = 110;
        g.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 0.2);
        osc.connect(g); g.connect(AudioCtx.destination);
        osc.start(); osc.stop(AudioCtx.currentTime + 0.2);
    }

    function showSummary() {
        document.getElementById('summary-modal').style.display = 'flex';
        document.getElementById('final-score').innerText = state.score;
    }

    function resetGame() { location.reload(); }
</script>
</body>
</html>
